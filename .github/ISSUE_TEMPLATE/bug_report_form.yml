name: Bug Report
description: File a bug report
title: "[BUG]: "
labels: ["bug", "? - Needs Triage"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of VSS are you running?
      placeholder: "e.g. 3.1.0"
    validations:
      required: true
  - type: dropdown
    id: installation
    attributes:
      label: Installation method
      options:
        - Docker Compose
        - Source build
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Deploy with '...'
        2. Send request '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear description of what you expected to happen.
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please paste any relevant log output.
      render: shell
  - type: textarea
    id: env
    attributes:
      label: Environment details
      description: |
        Include relevant details about your environment:
        - OS and version
        - GPU model and driver version
        - Docker version
        - Any relevant configuration
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](https://github.com/NVIDIA-AI-Blueprints/video-search-and-summarization/blob/main/CODE_OF_CONDUCT.md)
          required: true
