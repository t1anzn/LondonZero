services:
  vss-proxy:
    image: nginx:1.27-alpine
    profiles:
    - "bp_developer_base_2d_proxy"
    - "bp_developer_search_2d_proxy"
    - "bp_developer_lvs_2d_proxy"
    - "bp_developer_alerts_2d_cv_proxy"
    - "bp_developer_alerts_2d_vlm_proxy"
    container_name: vss-proxy
    network_mode: host
    restart: always
    environment:
      PROXY_PORT: ${PROXY_PORT:-7777}
      VST_SUB_FILTER_HOST: ${HOST_IP:-_DISABLED_}
      VST_SUB_FILTER_EXTERNAL: ${EXTERNAL_IP:-_DISABLED_}
    volumes:
      - ${MDX_SAMPLE_APPS_DIR}/proxy/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
    command:
      - /bin/sh
      - -c
      - |
        mkdir -p /tmp/nginx
        envsubst '$$PROXY_PORT $$VST_SUB_FILTER_HOST $$VST_SUB_FILTER_EXTERNAL' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
        exec nginx -g 'daemon off;'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:${PROXY_PORT:-7777}/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
