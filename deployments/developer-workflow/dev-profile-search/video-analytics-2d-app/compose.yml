  perception-2d-fusion:
    build:
      context: $MDX_SAMPLE_APPS_DIR/developer-workflow/dev-profile-search/video-analytics-2d-app
      args:
        PERCEPTION_IMAGE: $PERCEPTION_IMAGE
        PERCEPTION_TAG: $PERCEPTION_TAG
      dockerfile: Dockerfiles/perception-$MODEL_TYPE.Dockerfile
    network_mode: "host"
    runtime: nvidia
    profiles: ["bp_developer_search_2d"]
    container_name: perception-2d
    deploy:
      restart_policy:
          condition: on-failure
          max_attempts: 2
      resources:
        reservations:
          devices:
          - capabilities:
            - gpu
            device_ids:
            - "${RT_CV_DEVICE_ID:-0}"
    volumes:
      - $MDX_SAMPLE_APPS_DIR/developer-workflow/dev-profile-search/video-analytics-2d-app/deepstream/configs/cnn-models/ds-main-config.txt:/opt/nvidia/deepstream/deepstream/sources/apps/sample_apps/metropolis_perception_app/ds-main-config.txt
      - $MDX_SAMPLE_APPS_DIR/developer-workflow/dev-profile-search/video-analytics-2d-app/deepstream/configs/cnn-models/ds-main-redis-config.txt:/opt/nvidia/deepstream/deepstream/sources/apps/sample_apps/metropolis_perception_app/ds-main-redis-config.txt
      - $MDX_DATA_DIR/models/rtdetr_warehouse_v1.0.1.fp16.onnx:/opt/storage/rtdetr_warehouse_v1.0.1.fp16.onnx
      - $MDX_DATA_DIR/models/radio-clip_v1.0.onnx:/opt/storage/radio-clip_v1.0.onnx
      - $MDX_DATA_DIR/models/radio-clip_v1.0_weights.bin:/opt/storage/radio-clip_v1.0_weights.bin
      - $MDX_DATA_DIR/models/radio-clip_v1.0_tokenizer:/opt/storage/radio-clip_v1.0_tokenizer

    environment:
      MODEL_TYPE: ${MODEL_TYPE}
      STREAM_TYPE: ${STREAM_TYPE}
      DEEPSTREAM_ENABLE_SENSOR_ID_EXTRACTION: "1"
      GST_ENABLE_CUSTOM_PARSER_MODIFICATIONS: 1
      OTEL_SERVICE_NAME: "rtvi-cv"
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4318}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-otlp}
      GST_PLUGIN_PATH: /opt/nvidia/deepstream/deepstream/sources/gst-plugins/gst-nvdstextembedder
      TRANSFORMERS_OFFLINE: 0
      HF_HUB_OFFLINE: 0
    command: ["bash", "-c", "./ds-start.sh"]
    depends_on:
      sensor-ms-dev:
        condition: service_started
      broker-health-check:
        condition: service_completed_successfully


volumes:
  mdx-nvstreamer-data:        
  mdx-nvstreamer-videos: 
  perception-2d:
