services:

  vss-ui:
    image: nvcr.io/nvidia/vss-core/vss-agent-ui:3.1.0
    profiles: ["bp_wh_2d","bp_smc_2d","bp_ps_2d","bp_developer_base_2d","bp_developer_search_2d","bp_developer_lvs_2d","bp_developer_alerts_2d_cv", "bp_developer_alerts_2d_vlm"]
    container_name: metropolis-vss-ui
    ports:
      - 3000:3000
    restart: always
    depends_on:
      vss-agent:
        condition: service_healthy
    environment:
      RUN_APP_NAME: nv-metropolis-bp-vss-ui
      NEXT_PUBLIC_APP_TITLE: '${NEXT_PUBLIC_APP_TITLE:-VSS BLUEPRINT}'
      NEXT_PUBLIC_APP_SUBTITLE: '${NEXT_PUBLIC_APP_SUBTITLE:-VISION}'
      # === Chat Tab Configuration ===
      NEXT_PUBLIC_ENABLE_CHAT_TAB: ${NEXT_PUBLIC_ENABLE_CHAT_TAB:-true}
      NEXT_PUBLIC_WORKFLOW: '${NEXT_PUBLIC_WORKFLOW:-Vision Agent}'
      NEXT_PUBLIC_WEBSOCKET_CHAT_COMPLETION_URL: ${BREV_WS_AGENT_URL:-ws://${EXTERNAL_IP}:${VSS_AGENT_PORT:-8000}/websocket}
      NEXT_PUBLIC_HTTP_CHAT_COMPLETION_URL: http://${HOST_IP}:${VSS_AGENT_PORT:-8000}/chat/stream
      NEXT_PUBLIC_WEB_SOCKET_DEFAULT_ON: ${NEXT_PUBLIC_WEB_SOCKET_DEFAULT_ON:-false}
      NEXT_PUBLIC_RIGHT_MENU_OPEN: ${NEXT_PUBLIC_RIGHT_MENU_OPEN:-false}
      NEXT_PUBLIC_ENABLE_INTERMEDIATE_STEPS: ${NEXT_PUBLIC_ENABLE_INTERMEDIATE_STEPS:-true}
      NEXT_PUBLIC_SHOW_THEME_TOGGLE_BUTTON: ${NEXT_PUBLIC_SHOW_THEME_TOGGLE_BUTTON:-false}
      NEXT_PUBLIC_DARK_THEME_DEFAULT: ${NEXT_PUBLIC_DARK_THEME_DEFAULT:-true}
      NEXT_PUBLIC_SIDE_CHATBAR_COLLAPSED: ${NEXT_PUBLIC_SIDE_CHATBAR_COLLAPSED:-true}
      NEXT_PUBLIC_CHAT_HISTORY_DEFAULT_ON: ${NEXT_PUBLIC_CHAT_HISTORY_DEFAULT_ON:-true}
      NEXT_PUBLIC_AGENT_API_URL_BASE: ${BREV_API_URL:-http://${EXTERNAL_IP}:${VSS_AGENT_PORT:-8000}/api/v1}
      NEXT_PUBLIC_CHAT_INPUT_MIC_ENABLED: ${NEXT_PUBLIC_CHAT_INPUT_MIC_ENABLED:-false}
      NEXT_PUBLIC_CHAT_MESSAGE_EDIT_ENABLED: ${NEXT_PUBLIC_CHAT_MESSAGE_EDIT_ENABLED:-false}
      NEXT_PUBLIC_CHAT_MESSAGE_SPEAKER_ENABLED: ${NEXT_PUBLIC_CHAT_MESSAGE_SPEAKER_ENABLED:-false}
      NEXT_PUBLIC_CHAT_MESSAGE_COPY_ENABLED: ${NEXT_PUBLIC_CHAT_MESSAGE_COPY_ENABLED:-false}
      NEXT_PUBLIC_INTERACTION_MODAL_CANCEL_ENABLED: ${NEXT_PUBLIC_INTERACTION_MODAL_CANCEL_ENABLED:-false}
      NEXT_PUBLIC_CHAT_UPLOAD_FILE_ENABLE: ${NEXT_PUBLIC_CHAT_UPLOAD_FILE_ENABLE:-true}
      # Upload file config template JSON
      NEXT_PUBLIC_CHAT_UPLOAD_FILE_CONFIG_TEMPLATE_JSON: ${NEXT_PUBLIC_CHAT_UPLOAD_FILE_CONFIG_TEMPLATE_JSON:-{}}
      # Upload file hidden message template
      NEXT_PUBLIC_CHAT_UPLOAD_FILE_HIDDEN_MESSAGE_TEMPLATE: "Let's show the videos just uploaded {filenames}?"
      # Upload file metadata enabled
      NEXT_PUBLIC_CHAT_UPLOAD_FILE_METADATA_ENABLED: false
      # Custom agent parameters JSON
      NEXT_PUBLIC_CHAT_API_CUSTOM_AGENT_PARAMS_JSON: ${NEXT_PUBLIC_CHAT_API_CUSTOM_AGENT_PARAMS_JSON:-{}}
      # === End of Chat Tab Configuration ===

      # === Alerts Tab Configuration ===
      NEXT_PUBLIC_ENABLE_ALERTS_TAB: ${NEXT_PUBLIC_ENABLE_ALERTS_TAB:-true}
      NEXT_PUBLIC_VST_API_URL: ${BREV_VST_API_URL:-http://${EXTERNAL_IP}:${VST_PORT:-30888}/vst/api}
      NEXT_PUBLIC_MDX_WEB_API_URL: ${BREV_MDX_URL:-http://${EXTERNAL_IP}:${MDX_PORT:-8081}}
      NEXT_PUBLIC_ALERTS_TAB_MAX_RESULT_SIZE: 100
      NEXT_PUBLIC_ALERTS_TAB_DEFAULT_TIME_WINDOW_IN_MINUTES: 10
      NEXT_PUBLIC_ALERTS_TAB_DEFAULT_AUTO_REFRESH_IN_MILLISECONDS: 1000
      NEXT_PUBLIC_ALERTS_TAB_VERIFIED_FLAG_DEFAULT: ${NEXT_PUBLIC_ALERTS_TAB_VERIFIED_FLAG_DEFAULT:-false}
      NEXT_PUBLIC_ALERTS_TAB_ALERT_REPORT_PROMPT_TEMPLATE: "Generate a report for incident {incidentId} with sensor id {sensorId}."
      # Max search time limit (0 = unlimited, or use: 10m, 2h, 3d, 1w, 2M, 1y)
      NEXT_PUBLIC_ALERTS_TAB_MAX_SEARCH_TIME_LIMIT: 0
      NEXT_PUBLIC_ALERTS_TAB_MEDIA_WITH_OBJECTS_BBOX: ${NEXT_PUBLIC_ALERTS_TAB_MEDIA_WITH_OBJECTS_BBOX:-true}
      # === End of Alerts Tab Configuration ===

      # === Dashboard Tab Configuration ===
      NEXT_PUBLIC_ENABLE_DASHBOARD_TAB: ${NEXT_PUBLIC_ENABLE_DASHBOARD_TAB:-true}
      NEXT_PUBLIC_DASHBOARD_TAB_KIBANA_BASE_URL: ${BREV_KIBANA_URL:-http://${EXTERNAL_IP}:5601}
      # === End of Dashboard Tab Configuration ===

      # === SMC Map Tab Configuration ===
      NEXT_PUBLIC_ENABLE_MAP_TAB: ${NEXT_PUBLIC_ENABLE_MAP_TAB:-false}
      NEXT_PUBLIC_MAP_URL: ${BREV_MAP_URL:-http://${EXTERNAL_IP}:3002}
      # === End of SMC Map Tab Configuration ===

      # === Video Management Tab Configuration ===
      NEXT_PUBLIC_ENABLE_VIDEO_MANAGEMENT_TAB: ${NEXT_PUBLIC_ENABLE_VIDEO_MANAGEMENT_TAB:-true}
      NEXT_PUBLIC_VIDEO_MANAGEMENT_TAB_ADD_RTSP_ENABLE: ${NEXT_PUBLIC_VIDEO_MANAGEMENT_TAB_ADD_RTSP_ENABLE:-true}
      NEXT_PUBLIC_VIDEO_MANAGEMENT_VIDEO_UPLOAD_ENABLE: ${NEXT_PUBLIC_VIDEO_MANAGEMENT_VIDEO_UPLOAD_ENABLE:-true}
      # === End of Video Management Tab Configuration ===

      # === Search Tab Configuration ===
      NEXT_PUBLIC_ENABLE_SEARCH_TAB: ${NEXT_PUBLIC_ENABLE_SEARCH_TAB:-false}
      NEXT_PUBLIC_SEARCH_TAB_MEDIA_WITH_OBJECTS_BBOX: ${NEXT_PUBLIC_SEARCH_TAB_MEDIA_WITH_OBJECTS_BBOX:-true}
      # --- Search Tab Chat (collapsible sidebar) ---
      # Default false; set to true to enable Chat sidebar on Search tab
      NEXT_PUBLIC_SEARCH_TAB_CHAT_SIDEBAR_ENABLE: ${NEXT_PUBLIC_SEARCH_TAB_CHAT_SIDEBAR_ENABLE:-false}
      # Same semantics as main Chat tab; prefix NEXT_PUBLIC_SEARCH_TAB_CHAT_* (fallback to main NEXT_PUBLIC_* if unset)
      NEXT_PUBLIC_SEARCH_TAB_CHAT_SIDEBAR_OPEN_DEFAULT: ${NEXT_PUBLIC_SEARCH_TAB_CHAT_SIDEBAR_OPEN_DEFAULT:-false}
      NEXT_PUBLIC_SEARCH_TAB_CHAT_WORKFLOW: ${NEXT_PUBLIC_SEARCH_TAB_CHAT_WORKFLOW:-Vision Agent}
      NEXT_PUBLIC_SEARCH_TAB_CHAT_WEBSOCKET_CHAT_COMPLETION_URL: ${BREV_WS_AGENT_URL:-ws://${EXTERNAL_IP}:${VSS_AGENT_PORT:-8000}/websocket}
      NEXT_PUBLIC_SEARCH_TAB_CHAT_HTTP_CHAT_COMPLETION_URL: http://${HOST_IP}:${VSS_AGENT_PORT:-8000}/chat/stream
      NEXT_PUBLIC_SEARCH_TAB_CHAT_WEB_SOCKET_DEFAULT_ON: ${NEXT_PUBLIC_SEARCH_TAB_CHAT_WEB_SOCKET_DEFAULT_ON:-false}
      NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_HISTORY_DEFAULT_ON: ${NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_HISTORY_DEFAULT_ON:-true}
      NEXT_PUBLIC_SEARCH_TAB_CHAT_ENABLE_INTERMEDIATE_STEPS: ${NEXT_PUBLIC_SEARCH_TAB_CHAT_ENABLE_INTERMEDIATE_STEPS:-true}
      NEXT_PUBLIC_SEARCH_TAB_CHAT_DARK_THEME_DEFAULT: ${NEXT_PUBLIC_SEARCH_TAB_CHAT_DARK_THEME_DEFAULT:-true}
      NEXT_PUBLIC_SEARCH_TAB_CHAT_SIDE_CHATBAR_COLLAPSED: ${NEXT_PUBLIC_SEARCH_TAB_CHAT_SIDE_CHATBAR_COLLAPSED:-true}
      NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_INPUT_MIC_ENABLED: ${NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_INPUT_MIC_ENABLED:-false}
      NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_MESSAGE_EDIT_ENABLED: ${NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_MESSAGE_EDIT_ENABLED:-false}
      NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_MESSAGE_SPEAKER_ENABLED: ${NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_MESSAGE_SPEAKER_ENABLED:-false}
      NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_MESSAGE_COPY_ENABLED: ${NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_MESSAGE_COPY_ENABLED:-false}
      NEXT_PUBLIC_SEARCH_TAB_CHAT_INTERACTION_MODAL_CANCEL_ENABLED: ${NEXT_PUBLIC_SEARCH_TAB_CHAT_INTERACTION_MODAL_CANCEL_ENABLED:-false}
      NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_UPLOAD_FILE_ENABLE: ${NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_UPLOAD_FILE_ENABLE:-true}
      NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_UPLOAD_FILE_METADATA_ENABLED: ${NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_UPLOAD_FILE_METADATA_ENABLED:-false}
      NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_UPLOAD_FILE_HIDDEN_MESSAGE_TEMPLATE: ${NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_UPLOAD_FILE_HIDDEN_MESSAGE_TEMPLATE:-}
      NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_API_CUSTOM_AGENT_PARAMS_JSON: ${NEXT_PUBLIC_SEARCH_TAB_CHAT_CHAT_API_CUSTOM_AGENT_PARAMS_JSON:-{}}
      # === End of Search Tab Configuration ===
