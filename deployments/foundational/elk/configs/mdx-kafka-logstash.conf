filter {
	json { source => "message" }
	# Formatting timestamp
	ruby {
		code => "event.set('timestamp',(((event.get('[timestamp][seconds]').to_f)*1000) +((event.get('[timestamp][nanos]').to_f) * (10 ** -6)).floor()))"
	}
	date {
		match => [ "timestamp","UNIX_MS" ]
		target => "timestamp"
		timezone => "UTC"
	}

	if [type] == "mdx-behavior" or [type] == "mdx-events" or [type] == "mdx-alerts" or [type] == "mdx-vlm-alerts" or [type] == "mdx-incidents" or [type] == "mdx-vlm-incidents" or [type] == "mdx-embed-filtered" {
		# Formatting end timestamp
		ruby {
			code => "event.set('end',(((event.get('[end][seconds]').to_f)*1000) +((event.get('[end][nanos]').to_f) * (10 ** -6)).floor()))"
		}
		date {
			match => [ "end","UNIX_MS" ]
			target => "end"
			timezone => "UTC"
		}
		# Removing embeddings field
		# mutate {
		# 	remove_field => ["embeddings"]
		# }
		if "[object][bbox3d]" {
			mutate {
				remove_field => ["[object][bbox3d][embeddings]"]
			}
		}
		# Formatting locations and smoothLocations fields
		if [type] != "mdx-incidents" and [type] != "mdx-vlm-incidents" {
			ruby {
				code => '
					locations = []
					currentLocations=event.get("locations")
					if currentLocations
						for location in currentLocations["coordinates"] do
							locations.append(location["point"])
						end
						event.set("[locations][coordinates]",locations)
					end
					smoothLocations = []
					currentSmoothLocations=event.get("smoothLocations")
					if currentSmoothLocations
						for smoothLocation in currentSmoothLocations["coordinates"] do
							smoothLocations.append(smoothLocation["point"])
						end
						event.set("[smoothLocations][coordinates]",smoothLocations)
					end
				'
			}
		}
	}
	if [type] == "mdx-behavior" {
		fingerprint {
			method => "SHA1"
			key => "HMAC"
			source => [ "timestamp", "[place][name]", "[sensor][id]", "[object][id]"]
			concatenate_sources => true
			target => "Id"
		}
	}
	else if [type] == "mdx-alerts" or [type] == "mdx-vlm-alerts" or [type] == "mdx-events" {
		fingerprint {
			method => "SHA1"
			key => "HMAC"
			source => [ "timestamp", "[place][name]", "[sensor][id]", "[object][id]", "[analyticsModule][id]"]
			concatenate_sources => true
			target => "Id"
		}
	}
	else if [type] == "mdx-mtmc" {
		fingerprint {
			method => "SHA1"
			key => "HMAC"
			source => [ "globalId", "timestamp"]
			concatenate_sources => true
			target => "Id"
		}
	}
	else if [type] == "mdx-space-utilization" {
		fingerprint {
			method => "SHA1"
			key => "HMAC"
			source => [ "timestamp", "id" ]
			concatenate_sources => true
			target => "Id"
		}
	}
	else if [type] == "mdx-incidents" or [type] == "mdx-vlm-incidents" {
		if [info] and [info][primaryObjectId] {
			fingerprint {
				method => "SHA1"
				key => "HMAC"
				source => [ "timestamp", "category", "sensorId", "[info][primaryObjectId]" ]
				concatenate_sources => true
				target => "Id"
			}
		}
		else {
			fingerprint {
				method => "SHA1"
				key => "HMAC"
				source => [ "timestamp", "category", "sensorId" ]
				concatenate_sources => true
				target => "Id"
			}
		}
	}
	else if [type] == "mdx-embed-filtered" {
		fingerprint {
			method => "SHA1"
			key => "HMAC"
			source => [ "timestamp", "end", "[sensor][id]" ]
			concatenate_sources => true
			target => "Id"
		}
	}
	if [type] == "mdx-amr" {
		mutate {
			update => { "type" => "%{[@metadata][kafka][headers][type]}" }
		}	
	}
	grok {
		match => ["timestamp", "%{YEAR:[@metadata][year]}-%{MONTHNUM:[@metadata][month]}-%{MONTHDAY:[@metadata][day]}T%{GREEDYDATA}"]
	}
	mutate {
		remove_field => ["kafka", "message", "@timestamp", "@version"]
	}
}
output {
	if [type] == "mdx-behavior" or [type] == "mdx-events" or [type] == "mdx-alerts" or [type] == "mdx-mtmc" or [type] == "mdx-space-utilization" or [type] == "mdx-vlm-alerts" or [type] == "mdx-incidents" or [type] == "mdx-vlm-incidents" or [type] == "mdx-embed-filtered" {
		elasticsearch {
			hosts => "localhost:9200"
			index => "%{type}-%{[@metadata][year]}-%{[@metadata][month]}-%{[@metadata][day]}"
			document_type => "logs"
			retry_max_interval => 10
			action => "index"
			document_id => "%{Id}"
			timeout => 60
		}
	}
	else {
		elasticsearch {
			hosts => "localhost:9200"
			index => "%{type}-%{[@metadata][year]}-%{[@metadata][month]}-%{[@metadata][day]}"
			document_type => "logs"
			retry_max_interval => 10
			action => "index"
			timeout => 60
		}
	}
}
