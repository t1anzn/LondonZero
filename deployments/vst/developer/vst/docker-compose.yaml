include:
  - path: $MDX_SAMPLE_APPS_DIR/vst/developer/vst/sdr-streamprocessing/sdr-compose.yaml

services:
  sensor-ms-dev:
    image: ${VST_SENSOR_IMAGE}
    profiles: ["bp_developer_base_2d","bp_developer_search_2d","bp_developer_lvs_2d","bp_developer_alerts_2d_cv","bp_developer_alerts_2d_vlm"]
    user: "0:0"
    runtime: nvidia
    entrypoint: ["/bin/bash", "-c", "exec /home/vst/vst_release/launch_vst"]
    environment:
      - ADAPTOR=${VST_ADAPTOR}
      - NEED_RECORDING=false
      - NEED_RTSPSERVER=false
      - NEED_STORAGE=false
      - NEED_STREAM_MONITORING=true
      - HTTP_PORT=${SENSOR_HTTP_PORT:-30000}
      - CENTRALIZE_DB_NAME=${CENTRALIZE_DB_NAME}
      - CENTRALIZE_DB_USERNAME=${CENTRALIZE_DB_USERNAME}
      - STREAM_PROCESSOR_MODULE_ENDPOINT=${STREAM_PROCESSOR_MODULE_ENDPOINT}
    volumes:
      - ${VST_CONFIG_PATH}:/home/vst/vst_release/configs
      - ${VST_CONFIG_PATH}/vst_config_${STREAM_TYPE:-redis}.json:/home/vst/vst_release/configs/vst_config.json
      - ${VST_DATA_PATH}:/home/vst/vst_release/vst_data
      - ${VST_VIDEO_STORAGE_PATH}:/home/vst/vst_release/vst_video
    network_mode: host
    container_name: sensor-ms-dev
    restart: on-failure    # Restart only if the container exits with non-zero status
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/${HTTP_PORT:-30000}'"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 5s
    depends_on:
      centralizedb-dev:
        condition: service_healthy
      sdr-streamprocessing:
        condition: service_started
      envoy-streamprocessing:
        condition: service_started

  centralizedb-dev:
    image: ${POSTGRES_IMAGE}
    profiles: ["bp_developer_base_2d","bp_developer_search_2d","bp_developer_lvs_2d","bp_developer_alerts_2d_cv","bp_developer_alerts_2d_vlm"]
    user: "0:0"
    environment:
      - POSTGRES_USER=${CENTRALIZE_DB_USERNAME}
      - POSTGRES_DB=${CENTRALIZE_DB_NAME}
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - ${VST_VOLUME}/postgres/db:/var/lib/postgresql/data
      - ${VST_CONFIG_PATH}/postgresql.conf:/etc/postgresql/postgresql.conf
      - ${VST_DATA_PATH}:/var/run/postgresql
    network_mode: host
    container_name: centralizedb-dev
    restart: always
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "unix_socket_directories=/var/run/postgresql"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vst -d nvcentralizedb"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 2s

  vst-ingress-dev:
    image: ${NGINX_IMAGE}
    profiles: ["bp_developer_base_2d","bp_developer_search_2d","bp_developer_lvs_2d","bp_developer_alerts_2d_cv","bp_developer_alerts_2d_vlm"]
    user: "0:0"
    environment:
      - HOST_IP=${HOST_IP}
      - EXTERNAL_IP=${EXTERNAL_IP}
      - VST_INGRESS_HTTP_PORT=${VST_INGRESS_HTTP_PORT}
    volumes:
      - ${VST_CONFIG_PATH}/nginx-${NGINX_MODE:-vst}.conf.template:/etc/nginx/nginx.conf.template:ro
      - ${VST_CONFIG_PATH}/nginx-${NGINX_MODE:-vst}.conf:/etc/nginx/nginx.conf
      - ${VST_LOGS}/nginx_logs:/var/log/nginx
    network_mode: host
    container_name: vst-ingress-dev
    restart: always    # Nginx should always restart as it's critical for routing
    command:
      - /bin/sh
      - -c
      - |
        sed 's/__INTERNAL_IP__/${HOST_IP}/g; s/__EXTERNAL_IP__/${EXTERNAL_IP}/g' /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
        exec nginx -g 'daemon off;'
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/$${VST_INGRESS_HTTP_PORT:-30888}'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 2s
    depends_on:
      sensor-ms-dev:
        condition: service_healthy

  vst-mcp-dev:
    image: ${VST_MCP_IMAGE}
    profiles: ["bp_developer_base_2d","bp_developer_search_2d","bp_developer_lvs_2d","bp_developer_alerts_2d_cv","bp_developer_alerts_2d_vlm"]
    user: "0:0"
    environment:
      - MCP_GATEWAY_CPP_API_BASE_URL=${MCP_GATEWAY_CPP_API_BASE_URL}
      - MCP_GATEWAY_CPP_API_TIMEOUT=30
      - MCP_GATEWAY_SERVER_NAME=vst-mcp-server
      - MCP_GATEWAY_SERVER_VERSION=1.0.0
      - MCP_GATEWAY_SERVER_HOST=${MCP_GATEWAY_SERVER_HOST}
      - MCP_GATEWAY_SERVER_PORT=${MCP_GATEWAY_SERVER_PORT}
      - MCP_GATEWAY_LOG_LEVEL=INFO
      - MCP_GATEWAY_ENABLE_JSONRPC_LOGGING=true
    network_mode: host
    container_name: vst-mcp-dev
    restart: always
    depends_on:
      sensor-ms-dev:
        condition: service_healthy
      vst-ingress-dev:
        condition: service_healthy
