services:
  streamprocessing-ms-dev:
    image: ${VST_STREAM_PROCESSOR_IMAGE}
    profiles: ["bp_developer_base_2d","bp_developer_search_2d","bp_developer_lvs_2d","bp_developer_alerts_2d_cv","bp_developer_alerts_2d_vlm"]
    container_name: streamprocessing-ms-dev
    network_mode: host
    runtime: nvidia
    user: "0:0"
    entrypoint: ["/bin/bash", "-c", "if [ \"$$VST_INSTALL_ADDITIONAL_PACKAGES\" = \"true\" ]; then /home/vst/vst_release/tools/user_additional_install.sh; fi && exec /home/vst/vst_release/launch_vst"]
    environment:
      - VST_INSTALL_ADDITIONAL_PACKAGES=${VST_INSTALL_ADDITIONAL_PACKAGES}
      - CONTAINER_NAME=streamprocessing-ms
      - ADAPTOR=${VST_ADAPTOR}
      - HTTP_PORT=${STREAM_PROCESSOR_HTTP_PORT:-30001}
      - RTSP_SERVER_PORT=${RTSP_SERVER_PORT}
      - CENTRALIZE_DB_NAME=${CENTRALIZE_DB_NAME}
      - CENTRALIZE_DB_USERNAME=${CENTRALIZE_DB_USERNAME}
      - SENSOR_MODULE_ENDPOINT=${SENSOR_MODULE_ENDPOINT}
      - VST_INGRESS_ENDPOINT=${VST_INGRESS_ENDPOINT}
    volumes:
      - ${VST_CONFIG_PATH}:/home/vst/vst_release/configs
      - ${VST_DATA_PATH}:/home/vst/vst_release/vst_data
      - ${VST_VIDEO_STORAGE_PATH}:/home/vst/vst_release/vst_video
      - ${CLIP_STORAGE_PATH}:/home/vst/vst_release/streamer_videos
      - ${VST_TEMP_FILES_PATH}:/home/vst/vst_release/webroot/temp_files
    restart: unless-stopped
    deploy:
      restart_policy:
        condition: always
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/${HTTP_PORT:-30001}'"]
      interval: 15s
      timeout: 3s
      retries: 30
      start_period: 20s
    depends_on:
      centralizedb-dev:
        condition: service_healthy
      redis:
        condition: service_started

  sdr-streamprocessing:
    image: ${SDR_IMAGE}
    profiles: ["bp_developer_base_2d","bp_developer_search_2d","bp_developer_lvs_2d","bp_developer_alerts_2d_cv","bp_developer_alerts_2d_vlm"]
    user: "0:0"
    network_mode: "host"
    logging:
      driver: "json-file"
      options:
        max-size: "8192m"
        max-file: "3"
    container_name: sdr-streamprocessing
    volumes:
      - ./sdr-config:/wdm-configs
      - /var/run/docker.sock:/var/run/docker.sock
      - ${VST_DATA_PATH}/sdr/streamprocessing/log:/log
    environment:
      PORT: 4003
      WDM_CLUSTER_CONFIG_FILE: /wdm-configs/docker_cluster_config.json
      CONTAINER_NAME: sdr-streamprocessing
      WDM_MSG_KEY: ${REDIS_MSG_KEY}
      WDM_WL_REDIS_SERVER: ${REDIS_HOSTADDR}
      WDM_WL_REDIS_PORT: ${REDIS_PORT}
      WDM_WL_REDIS_MSG_FIELD: sensor.id
      WDM_WL_ADD_URL: /api/v1/proxy/stream/add
      WDM_WL_DELETE_URL: /api/v1/proxy/stream/
      WDM_WL_HEALTH_CHECK_URL: /api/v1/proxy/configuration
      WDM_WL_CHANGE_ID_ADD: camera_proxy
      WDM_WL_CHANGE_ID_DEL: camera_remove
      WDM_PRELOAD_WORKLOAD: ./tests/event_pre-roll.json
      WDM_CLEAR_DATA_WL: true
      WDM_KFK_ENABLE: false
      WDM_MSG_TOPIC: vst_events
      WDM_KFK_BOOTSTRAP_URL: ${KAFKA_BOOTSTRAP_URL}
      WDM_DS_SWAP_ID_NAME: false
      WDM_WL_THRESHOLD: 100
      WDM_ADD_REMOVE_RETRY_ATTEMPTS: 50
      WDM_CLUSTER_TYPE: docker
      WDM_POD_WATCH_DOCKER_DELAY: 0.5
      WDM_RESTART_DS_ON_ADD_FAIL: false
      WDM_DISABLE_WERKZEUG_LOGGING: true
      WDM_WL_OBJECT_NAME: streamprocessing-ms
      WDM_CONSUMER_GRP_ID: sdr-streamprocessing-cg
      WDM_CLUSTER_CONTAINER_NAMES: '["streamprocessing-ms"]'
      VST_STREAMS_ENDPOINT: http://localhost:30000/api/v1/sensor/streams
      VST_STATUS_ENDPOINT: http://localhost:30000/api/v1/sensor/status
      OTEL_SDK_DISABLED: true
      WDM_INITIALIZE_FROM_VST: false
      ENVOY_REQUEST_TIMEOUT: 300
      WDM_TARGET_PORT_MAPPING: "{\"streamprocessing-ms-1\": ${STREAM_PROCESSOR_HTTP_PORT}}"
      OTEL_SERVICE_NAME: SDR_AGENT
      WDM_REDIS_CACHE_OBJECT: "streamprocessing-data"
      WDM_WL_NAME_IGNORE_REGEX: ""
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 300M
      restart_policy:
        condition: always
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/$${PORT:-4003}'"]
      interval: 15s
      timeout: 3s
      retries: 60
      start_period: 5s
    depends_on:
      redis:
        condition: service_started
      streamprocessing-ms-dev:
        condition: service_healthy

  envoy-streamprocessing:
    image: ${ENVOY_PROXY_IMAGE}
    profiles: ["bp_developer_base_2d","bp_developer_search_2d","bp_developer_lvs_2d","bp_developer_alerts_2d_cv","bp_developer_alerts_2d_vlm"]
    user: "0:0"
    command: /usr/local/bin/envoy -c /etc/envoy/envoy.yaml --concurrency 16 --base-id 1
    network_mode: "host"
    container_name: envoy-streamprocessing
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml
    restart: unless-stopped
    environment:
      WDM_WL_REDIS_SERVER: ${REDIS_HOSTADDR}
      CONTAINER_NAME: envoy-streamprocessing
      WDM_WL_REDIS_PORT: ${REDIS_PORT}
      WDM_KFK_BOOTSTRAP_URL: ${KAFKA_BOOTSTRAP_URL}
      WDM_WL_OBJECT_NAME: streamprocessing-ms
      ENVOYROUTEHEADER: "streamid"
      NOHEADERTARGETCONTAINER: "streamprocessing-ms-1"
    depends_on:
      redis:
        condition: service_started
      streamprocessing-ms-dev:
        condition: service_healthy