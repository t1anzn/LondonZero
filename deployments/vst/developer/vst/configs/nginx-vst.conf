worker_processes auto;

error_log  stderr info;
pid        /tmp/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    client_body_temp_path /tmp/nginx/client-body;
    proxy_temp_path       /tmp/nginx/proxy;
    fastcgi_temp_path     /tmp/nginx/fastcgi;
    uwsgi_temp_path       /tmp/nginx/uwsgi;
    scgi_temp_path        /tmp/nginx/scgi;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # Concise log format with essential debugging info
    log_format detailed '$remote_addr [$time_local] "$request" '
                       '$status $body_bytes_sent '
                       'rt:$request_time ut:$upstream_response_time '
                       'up:$upstream_addr';

    access_log /dev/stdout detailed;
    
    # Concise proxy debug format
    log_format proxy_debug '$remote_addr [$time_local] "$request" '
                          '$status rt:$request_time ut:$upstream_response_time '
                          'up:$upstream_addr us:$upstream_status';
    
    client_max_body_size 500M;

    # WebSocket proxy settings
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 30888;

        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Return 404 for any /vst/api/ path that is not matched by the specific
        # proxy blocks defined below. This prevents the UI fallback from
        # serving index.html for unknown API routes.
        location ^~ /vst/api/ {
            return 404;
        }

        # Redirect /vst → /vst/ for proper relative asset resolution
        location = /vst {
            return 301 /vst/;
        }

        # Serve hashed JS/CSS/other static assets under /vst/assets/
        location /vst/assets/ {
            alias /vst-ui/assets/;
            # The alias path takes care of mapping; rely on default 404 handling
        }

        # Serve favicons under /vst/favicon/
        location /vst/favicon/ {
            alias /vst-ui/favicon/;
        }

        location /vst/ {
            # Serve the built React UI from the "vst-ui" folder
            # Adjust the path below if you mount the build somewhere else in the container
            alias /vst-ui/;

            # Default document
            index index.html;

            # Support client-side routing (hash or path based)
            try_files $uri $uri/ /vst/index.html;
        }

        # Route sensor APIs to localhost:30000
        location /vst/api/v1/sensor/ {
            access_log /dev/stdout proxy_debug;

            rewrite ^/vst/api/v1/sensor/(.*) /api/v1/sensor/$1 break;
            proxy_pass http://localhost:30000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
        }

        location ~ ^/vst/api/v1/replay/stream/[^/]+/picture$ {
            rewrite ^/vst/api/v1/replay/(.*) /api/v1/replay/$1 break;
            proxy_pass http://localhost:10000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;

            proxy_hide_header Cache-Control;
            proxy_hide_header Expires;
            proxy_hide_header Pragma;
            add_header Cache-Control "public, max-age=3600";
        }

        # Route all other v1 APIs to streamprocessing-ms localhost:10000
        # This catch-all must come after the sensor location block
        location /vst/api/v1/ {
            rewrite ^/vst/api/v1/(.*) /api/v1/$1 break;
            proxy_pass http://localhost:10000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;

            # WebSocket specific settings
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Timeout settings
            proxy_read_timeout 3600s;  # 1 hour
            proxy_send_timeout 3600s;  # 1 hour

            # Buffer settings for large files
            proxy_buffering off;
            proxy_request_buffering off;

            proxy_hide_header Cache-Control;
            add_header Cache-Control "no-store" always;
        }

        # Route storage endpoint to localhost:10000
        location /vst/storage/ {
            rewrite ^/vst/storage/(.*) /storage/$1 break;
            proxy_pass http://localhost:10000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;

            # Timeout settings for large file downloads
            proxy_read_timeout 3600s;  # 1 hour
            proxy_send_timeout 3600s;  # 1 hour

            # Buffer settings for large files
            proxy_buffering off;
            proxy_request_buffering off;

            proxy_hide_header Cache-Control;
            proxy_hide_header Expires;
            proxy_hide_header Pragma;
            add_header Cache-Control "public, max-age=3600";
        }
    }
}
