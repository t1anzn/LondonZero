repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.3.3
  hooks:
  - id: ruff
    args: [--fix, --exit-non-zero-on-fix]
  - id: ruff-format

- repo: https://github.com/astral-sh/uv-pre-commit
  rev: 0.6.2
  hooks:
  - id: uv-lock

- repo: https://github.com/adrienverge/yamllint
  rev: v1.35.1
  hooks:
  - id: yamllint
    args:
    - '-d'
    - '{extends: default, rules: {line-length: {max: 120}, document-start: disable,
       indentation: {spaces: 2, indent-sequences: false}}}'
    files: \.(yaml|yml)$
    exclude: (^\.gitlab-ci\.yml$|^tests/\.gitlab-ci\.yml$)

- repo: local
  hooks:
  - id: gitleaks
    name: gitleaks
    language: docker_image
    entry: zricethezav/gitleaks:v8.30.0 protect --staged --redact -v --baseline-path gitleaks-baseline.json
    pass_filenames: false
    stages: [pre-commit]

- repo: https://github.com/Yelp/detect-secrets
  rev: v1.5.0
  hooks:
  - id: detect-secrets
    args: ['--baseline', '.secrets.baseline']
    exclude: gitleaks-baseline\.json$

- repo: local
  hooks:
  - id: mypy
    name: mypy
    entry: uv run mypy
    language: system
    types: [python]
    files: ^src/vss_agents/
    pass_filenames: false
    args: [src/vss_agents/]

default_language_version:
  python: python3
